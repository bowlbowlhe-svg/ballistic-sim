name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[all]

      - name: Run benchmark
        run: python scripts/benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json
          if-no-files-found: error

      - name: Compare with previous tag (placeholder)
        run: |
          echo "Performance regression check placeholder."
          echo "Current total elapsed:"
          python -c "import json; d=json.load(open('benchmark_results.json')); print(f\"{d['total_elapsed_s']:.3f} s\")"
          echo "TODO: fetch benchmark_results.json from previous tag and fail if >10% regression."
