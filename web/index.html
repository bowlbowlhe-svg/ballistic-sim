<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ballistic Sim Web API</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    h1 { color: #333; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    select, input, textarea, button {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.25rem;
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea { min-height: 200px; }
    button {
      margin-top: 1rem;
      cursor: pointer;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #005bb5; }
    pre {
      background: #f4f4f4;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
    #plot3d {
      width: 100%;
      height: 500px;
      margin-top: 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Ballistic Sim Web API</h1>
  <p>通过浏览器调用仿真 API，结果以 JSON 展示。</p>

  <form id="simForm">
    <label for="mission">任务类型</label>
    <select id="mission" name="mission">
      <option value="projectile" selected>projectile</option>
      <option value="missile">missile</option>
      <option value="rocket">rocket</option>
      <option value="icbm">icbm</option>
      <option value="suborbital">suborbital</option>
    </select>

    <label for="endpoint">端点</label>
    <select id="endpoint" name="endpoint">
      <option value="simulate" selected>/simulate/{mission}</option>
      <option value="monte-carlo">/simulate/monte-carlo</option>
      <option value="firecontrol">/firecontrol/solve</option>
    </select>

    <label for="payload">请求 JSON</label>
    <textarea id="payload" name="payload">{
  "launch": {
    "elevation_deg": 45,
    "azimuth_deg": 90
  },
  "include_trajectory": true
}</textarea>

    <button type="submit">发送请求</button>
  </form>

  <h2>响应</h2>
  <pre id="response">等待请求...</pre>

  <h2>3D 轨迹</h2>
  <button id="viz3dBtn" type="button">生成 3D 轨迹</button>
  <div id="plot3d"></div>

  <script>
    const form = document.getElementById('simForm');
    const missionSelect = document.getElementById('mission');
    const endpointSelect = document.getElementById('endpoint');
    const payloadBox = document.getElementById('payload');
    const responseBox = document.getElementById('response');
    const viz3dBtn = document.getElementById('viz3dBtn');
    const plot3d = document.getElementById('plot3d');

    endpointSelect.addEventListener('change', () => {
      if (endpointSelect.value === 'firecontrol') {
        payloadBox.value = JSON.stringify({
          target_lat_deg: 0.05,
          target_lon_deg: 0.05
        }, null, 2);
      } else if (endpointSelect.value === 'monte-carlo') {
        payloadBox.value = JSON.stringify({
          mission: 'projectile',
          launch: { elevation_deg: 45, azimuth_deg: 90 },
          n_samples: 20,
          backend: 'batch'
        }, null, 2);
      } else {
        payloadBox.value = JSON.stringify({
          launch: { elevation_deg: 45, azimuth_deg: 90 },
          include_trajectory: true
        }, null, 2);
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      responseBox.textContent = '请求中...';

      let url;
      const endpoint = endpointSelect.value;
      const mission = missionSelect.value;
      if (endpoint === 'simulate') {
        url = `/simulate/${mission}`;
      } else if (endpoint === 'monte-carlo') {
        url = '/simulate/monte-carlo';
      } else {
        url = '/firecontrol/solve';
      }

      let body;
      try {
        body = JSON.parse(payloadBox.value);
      } catch (err) {
        responseBox.textContent = 'JSON 解析错误: ' + err.message;
        return;
      }

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        responseBox.textContent = JSON.stringify({ status: res.status, body: data }, null, 2);
      } catch (err) {
        responseBox.textContent = '网络错误: ' + err.message;
      }
    });

    viz3dBtn.addEventListener('click', async () => {
      if (typeof Plotly === 'undefined') {
        plot3d.textContent = '无法加载 Plotly CDN，请检查网络连接。';
        return;
      }

      plot3d.textContent = '正在生成 3D 轨迹...';
      const mission = missionSelect.value;
      let body;
      try {
        body = JSON.parse(payloadBox.value);
      } catch (err) {
        plot3d.textContent = 'JSON 解析错误: ' + err.message;
        return;
      }

      try {
        const res = await fetch('/viz/trajectory3d', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mission: mission, ...body, format: 'json' })
        });
        const data = await res.json();
        if (!res.ok) {
          plot3d.textContent = '请求失败: ' + JSON.stringify(data, null, 2);
          return;
        }
        if (!data.x_km || !data.y_km || !data.z_km) {
          plot3d.textContent = '返回数据缺少坐标序列。';
          return;
        }

        const trajectoryTrace = {
          type: 'scatter3d',
          mode: 'lines',
          x: data.x_km,
          y: data.y_km,
          z: data.z_km,
          line: {
            color: data.alt_m,
            colorscale: 'Viridis',
            width: 4,
            colorbar: { title: 'Altitude (m)' }
          },
          name: 'Trajectory'
        };
        const markerTrace = {
          type: 'scatter3d',
          mode: 'markers',
          x: [data.x_km[0], data.x_km[data.x_km.length - 1]],
          y: [data.y_km[0], data.y_km[data.y_km.length - 1]],
          z: [data.z_km[0], data.z_km[data.z_km.length - 1]],
          marker: { size: 6, color: ['green', 'red'] },
          name: 'Start / End'
        };
        const layout = {
          title: '3D Trajectory (ECEF)',
          scene: {
            xaxis: { title: 'X (km)' },
            yaxis: { title: 'Y (km)' },
            zaxis: { title: 'Z (km)' },
            aspectmode: 'data'
          },
          margin: { l: 0, r: 0, b: 0, t: 40 }
        };
        Plotly.newPlot('plot3d', [trajectoryTrace, markerTrace], layout);
      } catch (err) {
        plot3d.textContent = '网络错误: ' + err.message;
      }
    });
  </script>
</body>
</html>
