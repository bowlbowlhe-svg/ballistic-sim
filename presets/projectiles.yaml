# 弹种预设参数 (从外弹道方程迁移)
# 说明：
# - m/d/v0/最大射程为公开实测值
# - i（弹形系数）由射程反求标定（45°匹配公开最大射程）
# - Ix ≈ 0.555·m·(d/2)^2, It ≈ 8.5·Ix 为按 M107 实测比例估算
# - 缠距为该类火炮典型值
# - 气动系数表为代表性曲线

